<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?bundle",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9"
      }
    }
    </script>
</head>
<body class="bg-slate-50">
    <div id="dermai-app-portal"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { HashRouter, Routes, Route, Link } from 'react-router-dom';
        import * as LucideIcons from 'lucide-react';
        import * as Recharts from 'recharts';
        import axios from 'axios';

        // 强行把唯一的 React 锁死在全局，防止 Hook 冲突
        window.React = React;

        const PageLoader = ({ name }) => {
            const [Comp, setComp] = useState(null);
            useEffect(() => {
                // 🚀 核心改动：加上时间戳后缀，强行突破 GitHub 的缓存
                fetch(`./pages/${name}.jsx?update=${Date.now()}`)
                    .then(res => res.text())
                    .then(code => {
                        const cleanCode = code.replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '// import removed');
                        const result = Babel.transform(cleanCode, { presets: ['react', 'typescript'] }).code;
                        const exports = {};
                        const module = { exports };
                        const fn = new Function('React', 'useState', 'useEffect', 'exports', 'module', 'LucideIcons', 'Recharts', 'axios', 'Link', result);
                        fn(React, useState, useEffect, exports, module, LucideIcons, Recharts, axios, Link);
                        setComp(() => module.exports.default || module.exports);
                    });
            }, [name]);

            return Comp ? <Comp /> : (
                <div className="flex h-screen items-center justify-center bg-white">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-indigo-600 font-black animate-pulse uppercase tracking-widest text-xs">DERMAI 系统初始化中...</p>
                    </div>
                </div>
            );
        };

        const App = () => (
            <HashRouter>
                <div className="min-h-screen flex flex-col font-sans">
                    <nav className="bg-white/80 backdrop-blur-md border-b px-8 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded shadow-lg shadow-indigo-100 flex items-center justify-center text-white font-bold text-xs">D</div>
                            <span className="text-xl font-black text-slate-800 tracking-tighter">DermAI</span>
                        </div>
                        <div className="flex gap-8 text-[10px] font-bold uppercase tracking-[0.2em]">
                            <Link to="/" className="text-slate-400 hover:text-indigo-600 transition-all">药研中心</Link>
                            <Link to="/target-id" className="text-slate-400 hover:text-indigo-600 transition-all">靶点识别</Link>
                        </div>
                    </nav>
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<PageLoader name="Dashboard" />} />
                            <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                        </Routes>
                    </main>
                </div>
            </HashRouter>
        );

        // 🚀 对应修改 1 的挂载点
        const portal = document.getElementById('dermai-app-portal');
        if (portal) {
            ReactDOM.createRoot(portal).render(<App />);
        }
    </script>
</body>
</html>
