<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "react-router-dom": "https://esm.sh/react-router-dom@6.28.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9",
        "react-force-graph-2d": "https://esm.sh/react-force-graph-2d"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,typescript">
        // 强制防止任何转换导致的 require 报错
        window.module = { exports: {} };
        window.exports = window.module.exports;

        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import App from './App.tsx'; 

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            console.log("DermAI: System initialized on GitHub Pages.");
        } catch (e) {
            console.error("DermAI Bootstrap Error:", e);
        }
    </script>
</body>
</html>
