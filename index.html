<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?bundle",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9"
      }
    }
    </script>
</head>
<body class="bg-slate-50">
    <div id="dermai-application-v1"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { HashRouter, Routes, Route, Link } from 'react-router-dom';
        import * as LucideIcons from 'lucide-react';
        import * as Recharts from 'recharts';
        import axios from 'axios';

        // 🚀 绝招 2：强行把 React 挂载到全局，防止任何组件去找别的 React 实例
        window.React = React;

        const PageLoader = ({ name }) => {
            const [Comp, setComp] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                // 加上随机参数，确保不抓取缓存的文件
                fetch(`./pages/${name}.jsx?v=${Date.now()}`)
                    .then(res => {
                        if (!res.ok) throw new Error(`无法加载 pages/${name}.jsx`);
                        return res.text();
                    })
                    .then(code => {
                        // 清理业务代码中的 import，防止它们再次触发加载冲突
                        const cleanCode = code.replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '// import cleaned');
                        
                        const result = Babel.transform(cleanCode, { 
                            presets: ['react', 'typescript'] 
                        }).code;

                        const exports = {};
                        const module = { exports };
                        
                        // 注入环境
                        const fn = new Function(
                            'React', 'useState', 'useEffect', 'exports', 'module', 
                            'LucideIcons', 'Recharts', 'axios', 'Link',
                            result
                        );
                        
                        fn(React, useState, useEffect, exports, module, LucideIcons, Recharts, axios, Link);
                        setComp(() => module.exports.default || module.exports);
                    })
                    .catch(err => setError(err.message));
            }, [name]);

            if (error) return <div className="p-20 text-red-500 text-center font-bold">同步异常: {error}</div>;

            return Comp ? <Comp /> : (
                <div className="flex h-[80vh] items-center justify-center">
                    <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );
        };

        const App = () => (
            <HashRouter>
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded"></div>
                            <span className="text-xl font-black text-slate-800">DermAI</span>
                        </div>
                        <div className="flex gap-6 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                            <Link to="/" className="hover:text-indigo-600">药研中心</Link>
                            <Link to="/target-id" className="hover:text-indigo-600">靶点识别</Link>
                        </div>
                    </nav>
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<PageLoader name="Dashboard" />} />
                            <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                        </Routes>
                    </main>
                </div>
            </HashRouter>
        );

        // 🚀 绝招 3：对应修改 1 的挂载点
        const container = document.getElementById('dermai-application-v1');
        if (container) {
            ReactDOM.createRoot(container).render(<App />);
        }
    </script>
</body>
</html>
