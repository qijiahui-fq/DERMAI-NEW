<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "react-router-dom": "https://esm.sh/react-router-dom@6.28.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        import React from 'react';
        import ReactDOM from 'react-dom/client';

        // 引入 App.jsx 的方式改为尝试性引入，强制 Babel 处理它
        async function init() {
            try {
                // 动态导入我们的 App.jsx
                const AppMod = await import('./App.jsx');
                const App = AppMod.default;
                
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
                console.log("DermAI: System successfully bypassed MIME check and rendered.");
            } catch (err) {
                console.error("DermAI Bootstrap Error:", err);
                document.getElementById('root').innerHTML = `<div class="p-10 text-red-500">系统启动失败，请检查文件路径或刷新页面。</div>`;
            }
        }

        init();
    </script>
</body>
</html>
