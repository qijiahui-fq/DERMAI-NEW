<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?bundle"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import { HashRouter, Routes, Route, Link } from 'react-router-dom';

        const { useState, useEffect } = React;

        const PageLoader = ({ name }) => {
            const [Comp, setComp] = useState(null);
            useEffect(() => {
                // 强制抓取你的 pages/pages/ 路径下的业务逻辑
                fetch(`./pages/pages/${name}.jsx`)
                    .then(res => res.text())
                    .then(code => {
                        // 彻底清理代码中的所有 import/export 关键字，防止语法冲突
                        const cleanCode = code
                            .replace(/import[\s\S]*?from\s+['"].*?['"];?/g, '')
                            .replace(/export\s+default\s+/g, 'const DefaultExport = ')
                            .replace(/export\s+/g, '');
                            
                        const result = Babel.transform(cleanCode, { 
                            presets: ['react', 'typescript'] 
                        }).code;
                        
                        const exports = {};
                        const module = { exports };
                        // 注入当前环境的变量
                        const fn = new Function('React', 'useState', 'useEffect', 'exports', 'module', result);
                        fn(React, useState, useEffect, exports, module);
                        
                        setComp(() => window.DefaultExport || module.exports.default || module.exports);
                    })
                    .catch(err => console.error(`${name} 加载失败:`, err));
            }, [name]);

            return Comp ? <Comp /> : (
                <div className="flex h-screen items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-indigo-600 font-bold">DermAI 正在激活皮科药研逻辑...</p>
                    </div>
                </div>
            );
        };

        const App = () => (
            <HashRouter>
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
                    <nav className="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded shadow-lg shadow-indigo-200"></div>
                            <span className="text-xl font-black text-slate-800 tracking-tight">DermAI</span>
                        </div>
                        <div className="flex gap-8 text-sm font-bold">
                            <Link to="/" className="text-slate-500 hover:text-indigo-600 transition-colors">药研中心</Link>
                            <Link to="/target-id" className="text-slate-500 hover:text-indigo-600 transition-colors">靶点识别</Link>
                        </div>
                    </nav>
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<PageLoader name="Dashboard" />} />
                            <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                            <Route path="*" element={<PageLoader name="Dashboard" />} />
                        </Routes>
                    </main>
                </div>
            </HashRouter>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
